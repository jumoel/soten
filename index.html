<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/soten.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f0ece4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1e" media="(prefers-color-scheme: dark)" />
    <title>Soten</title>
    <link rel="stylesheet" href="src/index.css" />
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          style="animation: soten-spin 0.8s linear infinite"
        >
          <circle cx="12" cy="12" r="10" class="loader-track" stroke-width="3" />
          <path
            d="M12 2a10 10 0 0 1 10 10"
            stroke="#e07040"
            stroke-width="3"
            stroke-linecap="round"
          />
        </svg>
        <style>
          #initial-loader {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0ece4;
          }
          .loader-track {
            stroke: #d8d4cc;
          }
          @media (prefers-color-scheme: dark) {
            #initial-loader {
              background: #1a1a1e;
            }
            .loader-track {
              stroke: #2a2a2e;
            }
          }
          @keyframes soten-spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="src/index.tsx"></script>
  </body>
</html>
