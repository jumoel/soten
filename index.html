<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/soten.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soten</title>
    <link rel="stylesheet" href="src/index.css" />
  </head>
  <body>
    <div id="root">
      <div
        id="initial-loader"
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #1a1a1e;
        "
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          style="animation: soten-spin 0.8s linear infinite"
        >
          <circle cx="12" cy="12" r="10" stroke="#2a2a2e" stroke-width="3" />
          <path
            d="M12 2a10 10 0 0 1 10 10"
            stroke="#e07040"
            stroke-width="3"
            stroke-linecap="round"
          />
        </svg>
        <style>
          @keyframes soten-spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="src/index.tsx"></script>
  </body>
</html>
