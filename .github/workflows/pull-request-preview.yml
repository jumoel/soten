name: Pull Request Preview

# Manages automatic preview deployments driven by the 'preview' label on PRs.
#
# Uses pull_request_target so the workflow runs in the base-branch context with
# write access. No PR code is ever executed: the working tree is checked out from
# main and only a specific commit SHA is fetched and pushed.
#
# A fixed branch is required because the GitHub OAuth app used for auth only
# accepts a fixed set of redirect domains. Only https://preview.soten.pages.dev
# is whitelisted, so per-PR branch URLs cannot be used.
#
# Only one preview is live at a time — last push wins.
#
# Behaviors:
#   labeled      + label == 'preview'  → force-push PR head SHA to preview branch
#   synchronize  + PR has 'preview'    → force-push updated PR head SHA to preview branch
#   closed       + PR has 'preview'    → remove the preview label

on:
  pull_request_target:
    types: [labeled, synchronize, closed]

jobs:
  deploy:
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'preview') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'preview'))

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the trusted base branch only — we never populate the working tree
          # with PR code. The PR commit is fetched by its SHA and pushed directly.
          ref: main
          fetch-depth: 1

      - name: Push PR commit to preview branch
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$HEAD_SHA"
          git push origin "$HEAD_SHA:refs/heads/preview" --force

  cleanup:
    if: >-
      github.event.action == 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview')

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Remove preview label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'preview',
            });
