name: Code Quality Checks

on: [push]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [lint, types, style, build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.tool }}
        run: |
          npm run ${{ matrix.tool }}

  static-checks:
    if: always()
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.checks.result }}" != "success" ]; then
            echo "One or more checks failed: ${{ needs.checks.result }}"
            exit 1
          fi
